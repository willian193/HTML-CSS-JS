<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>Tela de Login</title>
</head>

<body>

    <div class="login-box">

        <div class="topo">
            <h1>Login</h1>
        </div>

        <div class="conteudo">

            <input type="text" placeholder="Usuario">

            <input type="password" placeholder="Senha">

            <div class="bottom">

                <label>
                    <input type="checkbox">
                    Lembrese de mim
                </label>

                <button>LOGAR</button>

            </div>

        </div>

    </div>

</body>

</html>
